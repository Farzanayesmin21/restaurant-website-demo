<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found — OBSIDIAN</title>
<meta name="robots" content="noindex">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='16' fill='%23211B10'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='%23B23A2E' font-family='Georgia,serif'%3EO%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;0,800;0,900;1,600&family=Dancing+Script:wght@600;700&family=Alex+Brush&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script src="tailwind.browser.js"></script>
<style>
  /* ===== Sitewide scale + brand refinements ===== */
  html{font-size:18px;}                 /* base size bump so all rem-based text reads larger */
  body{line-height:1.65;}
  .font-logo{ font-family:'Alex Brush', cursive; letter-spacing:0.5px; }

  /* ===== 404 entrance animation ===== */
  @keyframes notFoundIn{
    from{ opacity:0; transform:translateY(22px); }
    to{ opacity:1; transform:translateY(0); }
  }
  .nf-in{ opacity:0; animation:notFoundIn .8s cubic-bezier(.16,.84,.44,1) forwards; }
</style>

</head>
<body class="bg-bg text-ink font-body font-normal min-h-screen flex items-center justify-center text-center px-6">
  <div class="max-w-md">
    <div class="font-heading font-bold text-8xl md:text-9xl text-gold leading-none nf-in" style="animation-delay:0ms">404</div>
    <h1 class="font-heading text-3xl mt-4 mb-4 nf-in" style="animation-delay:150ms">This table isn't set</h1>
    <p class="text-stone text-sm leading-relaxed mb-9 nf-in" style="animation-delay:280ms">The page you're looking for has been cleared. Let's get you back to the dining room.</p>
    <a href="index.html" class="inline-flex items-center gap-2 bg-gold text-white px-9 py-4 text-xs tracking-[2.5px] uppercase hover:bg-wine hover:-translate-y-1 transition-all duration-300 nf-in" style="animation-delay:420ms">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 12H5"/><path d="M11 18l-6-6 6-6"/></svg>
      Back to Home
    </a>
  </div>
</body>
</html>
